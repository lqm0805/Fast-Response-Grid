<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速反应网格 - 赛博朋克版</title>
    <style>
        /* ============================================================
           赛博朋克主题 CSS 变量系统
           未来切换主题只需修改 :root 中的变量即可
           ============================================================ */
        :root {
            /* ===== 主题色系 ===== */
            --primary-color: #00f3ff;
            /* 赛博蓝 */
            --secondary-color: #bd00ff;
            /* 霓虹紫 */
            --success-color: #00ff88;
            /* 荧光绿 */
            --error-color: #ff3366;
            /* 霓虹红 */
            --warning-color: #ffd700;
            /* 金色 */
            --text-color: #e0e0e0;
            /* 主文字色 */
            --text-muted: rgba(224, 224, 224, 0.6);

            /* ===== 背景色系 ===== */
            --bg-color-start: #06060c;
            --bg-color-mid: #0a0514;
            --bg-color-end: #030a14;

            /* ===== 玻璃态系统 ===== */
            --glass-bg: rgba(5, 5, 10, 0.6);
            --glass-border: rgba(0, 243, 255, 0.4);
            --glass-blur: 24px;
            --glass-shadow: 0 0 40px rgba(0, 243, 255, 0.2), 0 0 80px rgba(189, 0, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.05);

            /* ===== 发光强度 ===== */
            --glow-intensity-low: 0.5;
            --glow-intensity-mid: 0.8;
            --glow-intensity-high: 1.2;

            /* ===== 动画时长 ===== */
            --transition-fast: 0.15s;
            --transition-normal: 0.3s;
            --transition-slow: 0.5s;

            /* ===== 尺寸 ===== */
            --border-radius-sm: 6px;
            --border-radius-md: 10px;
            --border-radius-lg: 14px;
            --border-radius-xl: 20px;

            /* ===== 兼容旧变量（Canvas JS 使用） ===== */
            --stage-color: var(--primary-color);
            --score-color: var(--primary-color);
        }

        /* ===== 快速主题切换示例 =====
         * 方案2：日落橙色主题（取消注释即可切换）
         *
         * :root {
         *   --primary-color: #ff6b35;
         *   --secondary-color: #f7931e;
         *   --success-color: #ffd700;
         *   --error-color: #ff4444;
         *   --bg-color-start: #1a0a0a;
         *   --bg-color-mid: #2d1810;
         *   --bg-color-end: #1a0a0a;
         *   --glass-border: rgba(255, 107, 53, 0.3);
         * }
         *
         * 方案3：清新蓝色主题
         *
         * :root {
         *   --primary-color: #4a90e2;
         *   --secondary-color: #50e3c2;
         *   --success-color: #7ed321;
         *   --error-color: #e04f5f;
         *   --bg-color-start: #0a1628;
         *   --bg-color-mid: #0d2137;
         *   --bg-color-end: #0a1628;
         *   --glass-border: rgba(74, 144, 226, 0.3);
         * }
         */

        /* ===== 模块1：全局重置 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== 模块2：动态背景 ===== */
        body {
            background: #05050a;
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            transition: transform var(--transition-slow) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            padding-top: env(safe-area-inset-top);
        }

        /* 赛博动态背景光晕 + 透视网格 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0a2e 0%, #05050a 100%);
            perspective: 1000px;
        }

        .cyber-bg::after {
            content: "";
            position: absolute;
            top: 50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image:
                linear-gradient(rgba(189, 0, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg) translateY(-20%);
            mask-image: linear-gradient(to top, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 80%);
            z-index: -1;
        }

        .cyber-glow-1 {
            position: absolute;
            width: 80vmax;
            height: 80vmax;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.12) 0%, transparent 65%);
            top: -20%;
            left: -20%;
            animation: glow-move-1 25s ease-in-out infinite alternate;
        }

        .cyber-glow-2 {
            position: absolute;
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, rgba(189, 0, 255, 0.12) 0%, transparent 65%);
            bottom: -15%;
            right: -15%;
            animation: glow-move-2 30s ease-in-out infinite alternate-reverse;
        }

        @keyframes glow-move-1 {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(25%, 15%) scale(1.1);
            }
        }

        @keyframes glow-move-2 {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-20%, -20%) scale(1.2);
            }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(0, 243, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(189, 0, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 40%);
            animation: float-particles 15s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        body.error-flash {
            background: radial-gradient(circle at center, rgba(255, 51, 102, 0.25), var(--bg-color-start));
        }

        @keyframes bg-shift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes float-particles {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.7;
            }

            50% {
                transform: translate(-15px, 10px) scale(1.1);
                opacity: 1;
            }

            100% {
                transform: translate(10px, -15px) scale(0.95);
                opacity: 0.8;
            }
        }

        /* ===== 模块3：HUD 系统 ===== */
        #hud {
            position: relative;
            width: 92%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            margin-bottom: 8px;
            flex-shrink: 0;
            will-change: transform, margin-bottom;
        }

        .hud-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        #mode-label {
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 4px 14px;
            border-radius: 6px;
            background: rgba(0, 243, 255, 0.1);
            text-shadow: 0 0 10px var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            font-weight: 800;
        }

        #game-stats {
            display: flex;
            width: 100%;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            max-height: 0;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.4s ease, max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: max-height, opacity;
        }

        /* ===== 模块4：分数与发光文字 ===== */
        #score-main {
            font-size: clamp(6rem, 25vw, 9rem);
            font-weight: 900;
            color: #fff;
            text-shadow:
                0 0 10px var(--primary-color),
                0 0 20px var(--primary-color),
                0 0 40px var(--primary-color),
                0 0 80px rgba(0, 243, 255, 0.5);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 5px;
            line-height: 1;
        }

        .glow-text {
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(0, 243, 255, var(--glow-intensity-mid));
        }

        #meta-stats {
            display: flex;
            gap: 25px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 8px 30px;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        #status-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            margin: 15px 0 5px;
            position: relative;
            overflow: visible;
            border-radius: 3px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        #status-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00f3ff, #bd00ff);
            box-shadow:
                0 0 15px #00f3ff,
                0 0 30px rgba(0, 243, 255, 0.4);
            transition: width 0.1s linear;
            border-radius: 3px;
        }

        #lives-container {
            display: flex;
            gap: 5px;
        }

        .heart {
            color: var(--error-color);
            font-size: 1.2rem;
            transition: transform var(--transition-normal) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 4px var(--error-color));
        }

        .heart.lost {
            transform: scale(0);
            opacity: 0;
        }

        /* ===== 模块5：游戏视口与 Canvas ===== */
        #game-view {
            position: relative;
            width: 92vw;
            max-width: 480px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        /* 玻璃瓷砖层 */
        #glass-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            z-index: 1;
            padding: 6px;
            pointer-events: none;
        }

        .glass-tile {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin: 6px;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tile-active {
            background: var(--stage-color) !important;
            border-color: #fff !important;
            box-shadow: 0 0 30px var(--stage-color), inset 0 0 10px rgba(255, 255, 255, 0.5) !important;
            opacity: 0.9 !important;
            transform: scale(0.98);
        }

        .tile-mirror {
            background: #00ff88 !important;
            border-color: #fff !important;
            box-shadow: 0 0 30px #00ff88, inset 0 0 10px rgba(255, 255, 255, 0.5) !important;
            opacity: 0.9 !important;
            transform: scale(0.98);
        }

        .orbit-hider .glass-tile {
            display: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.4s;
        }

        /* ===== 模块6：玻璃态卡片 ===== */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--glass-shadow);
            padding: 3.5rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 450px;
            width: 90%;
            z-index: 200;
            will-change: opacity, transform;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 150;
        }

        .menu-title {
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 30px;
            letter-spacing: clamp(6px, 4vw, 15px);
            white-space: nowrap;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(0, 243, 255, 1)) drop-shadow(0 0 60px rgba(189, 0, 255, 0.8));
            text-transform: uppercase;
        }

        /* ===== 模块7：霓虹按钮系统 ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: min(85%, 240px);
        }

        button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 15px 18px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal) ease;
            border-radius: var(--border-radius-md);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .neon-button {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--primary-color);
            color: var(--text-color);
            box-shadow: 0 0 8px rgba(0, 243, 255, var(--glow-intensity-low)),
                inset 0 0 8px rgba(0, 243, 255, 0.05);
        }

        .neon-button:hover {
            background: rgba(0, 243, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 243, 255, var(--glow-intensity-mid)),
                inset 0 0 15px rgba(0, 243, 255, 0.1);
            transform: translateY(-2px);
        }

        .neon-button:active {
            transform: translateY(0);
        }

        .btn-selection {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid var(--primary-color);
            color: var(--text-color);
            box-shadow: 0 0 8px rgba(0, 243, 255, var(--glow-intensity-low)),
                inset 0 0 8px rgba(0, 243, 255, 0.05);
        }

        .btn-selection:hover {
            background: rgba(0, 243, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 243, 255, var(--glow-intensity-mid)),
                inset 0 0 15px rgba(0, 243, 255, 0.1);
            transform: translateY(-2px);
        }

        .sel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            width: 100%;
            margin-top: 18px;
        }

        .sel-btn {
            padding: 18px 14px;
            font-size: 1rem;
            text-align: center;
        }

        .back-btn {
            margin-top: 24px;
            font-size: 1.05rem !important;
            opacity: 0.7;
            border: none !important;
            text-decoration: none;
            background: none !important;
            color: var(--primary-color);
            cursor: pointer;
            box-shadow: none !important;
            text-shadow: 0 0 8px rgba(0, 243, 255, var(--glow-intensity-low));
        }

        .back-btn:hover {
            background: none !important;
            opacity: 1;
            text-shadow: 0 0 12px rgba(0, 243, 255, var(--glow-intensity-mid));
        }

        #sel-menu {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .btn-icon {
            font-size: 1.2rem;
        }

        .icon-btn {
            padding: 4px;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            transition: all var(--transition-normal);
        }

        .icon-btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 243, 255, var(--glow-intensity-low));
            transform: scale(1.1);
        }

        /* ===== 模块8：动画系统 ===== */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10rem;
            font-weight: 900;
            color: var(--primary-color);
            text-shadow:
                0 0 20px rgba(0, 243, 255, var(--glow-intensity-mid)),
                0 0 60px rgba(0, 243, 255, var(--glow-intensity-low));
            z-index: 150;
            pointer-events: none;
            display: none;
        }

        #badge-container {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 50;
        }

        .badge {
            font-size: 2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            text-shadow: 0 0 15px currentColor;
            animation: badgePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes badgePop {
            0% {
                transform: scale(0.5);
                opacity: 0;
                filter: blur(10px);
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
                filter: blur(0);
            }

            100% {
                transform: scale(1) translateY(-50px);
                opacity: 0;
            }
        }

        #feedback {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            transition: opacity var(--transition-normal);
            text-shadow: 0 0 15px currentColor;
        }

        .score-popup {
            position: absolute;
            font-weight: 900;
            font-size: 1.8rem;
            pointer-events: none;
            animation: float-up 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 200;
            text-shadow: 0 0 15px currentColor, 0 0 30px currentColor;
        }

        @keyframes float-up {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }

            20% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -100px) scale(1);
                opacity: 0;
            }
        }

        .shake {
            animation: error-shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes error-shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-6px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(6px, 0, 0);
            }
        }

        @keyframes neon-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        @keyframes glow-breathe {

            0%,
            100% {
                box-shadow: 0 0 8px rgba(0, 243, 255, 0.3);
            }

            50% {
                box-shadow: 0 0 20px rgba(0, 243, 255, 0.6), 0 0 40px rgba(0, 243, 255, 0.2);
            }
        }

        .combo-fire {
            animation: combo-pulse 0.3s ease-out;
            color: var(--warning-color) !important;
            text-shadow: 0 0 10px var(--warning-color), 0 0 20px var(--warning-color);
        }

        @keyframes combo-pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.4);
            }

            100% {
                transform: scale(1);
            }
        }

        .stats-footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.5;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="cyber-bg">
        <div class="cyber-glow-1"></div>
        <div class="cyber-glow-2"></div>
    </div>

    <div id="hud">
        <div class="hud-top">
            <div style="display: flex; align-items: center;">
                <button id="btn-quit" class="icon-btn"
                    style="display: none; width: 62px; height: 62px; margin-right: 15px; border: none; background: transparent; padding: 0;"
                    onclick="quitGame()">
                    <img src="./button_return.jpg"
                        style="width: 100%; height: 100%; object-fit: contain; pointer-events: none; filter: drop-shadow(0 0 8px rgba(0, 243, 255, 0.5));">
                </button>
                <div id="mode-label" style="display: none;"></div>
            </div>
            <div id="lives-container" style="display: none;">
                <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
            </div>
        </div>
        <div id="game-stats">
            <div id="score-main">0</div>
            <div id="meta-stats">
                <div>最佳: <span id="best-val">--</span>ms</div>
                <div>连击: <span id="combo-val">0</span></div>
            </div>
            <div id="status-bar">
                <div id="status-fill"></div>
            </div>
        </div>
    </div>

    <div id="game-view">
        <div id="glass-grid"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="countdown"></div>
        <div id="badge-container"></div>
        <div id="feedback"></div>

        <div id="overlay">
            <div class="glass-card">
                <div class="menu-title" id="menu-title">极速反应</div>
                <div class="btn-group">
                    <button class="neon-button" id="btn-adventure" onclick="startGame('ADVENTURE')">
                        <span class="btn-icon">🌌</span> <span id="txt-adv">冒险模式</span>
                    </button>
                    <button class="neon-button" id="btn-survival" onclick="startGame('SURVIVAL')">
                        <span class="btn-icon">⚡</span> <span id="txt-surv">生存模式</span>
                    </button>
                    <button class="neon-button" id="btn-entertainment" onclick="startGame('ENTERTAINMENT')">
                        <span class="btn-icon">🎭</span> <span id="txt-ent">娱乐混战</span>
                    </button>
                    <button class="btn-selection" id="btn-selection-open" onclick="showSelMenu()">
                        <span class="btn-icon">⚙️</span> <span id="txt-sel">自选模式</span>
                    </button>
                </div>
                <div id="sel-menu">
                    <div class="sel-grid">
                        <button class="sel-btn neon-button" onclick="startGame('SELECTION', 'DOUBLE')">双重目标</button>
                        <button class="sel-btn neon-button" onclick="startGame('SELECTION', 'SPEED')">极速加倍</button>
                        <button class="sel-btn neon-button" onclick="startGame('SELECTION', 'TINY')">微缩方块</button>
                        <button class="sel-btn neon-button" onclick="startGame('SELECTION', 'SPIN')">空间扭曲</button>
                        <button class="sel-btn neon-button" onclick="startGame('SELECTION', 'ORBIT')">轨道圆环</button>
                        <button class="sel-btn neon-button" onclick="startGame('SELECTION', 'MIRROR')">奇妙模式</button>
                    </div>
                    <button class="back-btn" onclick="hideSelMenu()" id="btn-back">返回</button>
                </div>
                <button class="back-btn glow-text" id="btn-history" onclick="showHistory()">历史记录</button>
            </div>
        </div>

        <div id="game-over-modal" class="modal-overlay">
            <div class="glass-card">
                <div class="menu-title" id="go-title">游戏结束</div>
                <div id="go-score"
                    style="font-size: 3rem; font-weight: 900; margin-bottom: 20px; color: var(--primary-color); text-shadow: 0 0 20px rgba(0,243,255,0.5);">
                    0</div>
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button class="neon-button" style="flex: 1;" onclick="playAgain()" id="btn-play-again">再来一局</button>
                    <button style="flex: 1;" onclick="goToMenu()" id="btn-go-home">回到主页</button>
                </div>
            </div>
        </div>

        <div id="history-modal" class="modal-overlay">
            <div class="glass-card"
                style="max-height: 85vh; overflow-y: auto; padding: 40px 30px; border-radius: 16px; border: 1px solid rgba(0, 243, 255, 0.5); box-shadow: 0 0 40px rgba(0,243,255,0.2), inset 0 0 20px rgba(0,243,255,0.05); background: rgba(15,15,25,0.95);">
                <div class="menu-title" id="history-title"
                    style="margin-bottom: 25px; font-size: 2.2rem; letter-spacing: 5px; filter: drop-shadow(0 0 20px rgba(0, 243, 255, 1));">
                    历史记录</div>
                <div id="history-content"
                    style="width: 100%; text-align: left; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; color: rgba(224, 224, 224, 0.9);">
                    <!-- Content injected via JS -->
                </div>
                <button class="neon-button" onclick="hideHistory()" id="btn-close-history"
                    style="width: 100%; font-size: 1.1rem; padding: 16px; border-width: 2px;">返回主界面</button>
            </div>
        </div>
    </div>

    <script>
        // --- CORE SYSTEM ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameState = {
            active: false,
            mode: '',
            score: 0,
            combo: 0,
            stage: 1,
            gridSize: 4,
            lives: 3,
            time: 60,
            activeIndex: -1,
            startTime: 0,
            isWaiting: false,
            bestReaction: Infinity,
            hitCount: 0,
            totalHits: 0,
            muted: localStorage.getItem('muted') === 'true',
            lang: localStorage.getItem('lang') || 'EN',
            chaosEvent: null,
            chaosTarget2: -1,
            expiryTimer: null,
            orbitAngle: 0,
            orbitSpeed: 0.05,
            orbitTargetAngle: 0,
            orbitActive: false,
            tinyShape: 'square',
            fixedChaos: null,
            mirrorAxis: null,
            mirrorTarget: -1,
            trapIndex: -1,
            trapTimer: null
        };

        const I18N = {
            CN: {
                title: '极速反应',
                adventure: '冒险模式',
                survival: '生存模式',
                entertainment: '娱乐混战',
                best: '最佳反应',
                combo: '连击',
                hiscore: '最高分',
                gameover: '游戏结束',
                result: '最终得分',
                event_double: '双重目标!!',
                event_speed: '极速加倍!!',
                event_tiny: '微缩方块!!',
                event_spin: '空间扭曲',
                event_orbit: '轨道圆环',
                selection: '自选模式',
                sel_double: '双重目标',
                sel_speed: '极速加倍',
                sel_tiny: '微缩方块',
                sel_spin: '空间扭曲',
                sel_orbit: '轨道圆环',
                sel_mirror: '奇妙模式',
                event_mirror: '奇妙模式!!'
            }
        };

        const THEMES = {
            1: { color: '#00f2ff', size: 4 }, // Cyan
            2: { color: '#ffd700', size: 5 }, // Gold
            3: { color: '#ff00ea', size: 6 }, // Magenta
            4: { color: '#ff3b3b', size: 7 }  // Red
        };

        // --- AUDIO ---
        function playTone(freq, type, duration, volume = 0.1) {
            if (gameState.muted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            tick: () => playTone(300 + (gameState.stage * 100), 'sine', 0.1),
            hit: (ms) => {
                const p = Math.max(400, 1200 - ms);
                playTone(p, 'sine', 0.2, 0.15);
                if (ms < 200) playTone(p * 1.5, 'triangle', 0.3, 0.1);
            },
            miss: () => { playTone(150, 'sawtooth', 0.3, 0.2); playTone(100, 'square', 0.2, 0.1); },
            count: (f) => playTone(f, 'sine', 0.1, 0.1),
            gameOver: () => {
                playTone(523.25, 'sine', 0.1, 0.1); // C5
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); // E5
                setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); // G5
            }
        };

        // --- PARTICLES ---
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.04;
            }
        }
        let particles = [];

        // --- RENDER ---
        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.7, 500);
            canvas.width = size * dpr; canvas.height = size * dpr;
            ctx.scale(dpr, dpr);
            draw();
        }

        function drawSprites(i, x, y, size, gap, isActive) {
            const themeColor = THEMES[gameState.stage].color;
            ctx.fillStyle = isActive ? themeColor : 'rgba(255, 255, 255, 0.03)';

            if (isActive) {
                ctx.shadowBlur = 30; ctx.shadowColor = themeColor;
            }

            const drawSize = size - 12;
            const radius = 8;

            if (gameState.chaosEvent === 'TINY') {
                const tinySize = drawSize * 0.35;
                const centerX = x + size / 2;
                const centerY = y + size / 2;
                const shape = gameState.tinyShape || 'square';

                if (shape === 'square') {
                    ctx.beginPath(); ctx.roundRect(centerX - tinySize / 2, centerY - tinySize / 2, tinySize, tinySize, 4); ctx.fill();
                } else if (shape === 'circle') {
                    ctx.beginPath(); ctx.arc(centerX, centerY, tinySize / 2, 0, Math.PI * 2); ctx.fill();
                } else if (shape === 'heart') {
                    drawHeart(centerX, centerY, tinySize);
                } else if (shape === 'star') {
                    drawStar(centerX, centerY, 5, tinySize / 2, tinySize / 4);
                }
            }
            // Normal mode sprites are now handled by DOM classes in draw()

            ctx.shadowBlur = 0;
        }

        function drawHeart(x, y, size) {
            const w = size;
            const h = size;
            ctx.beginPath();
            ctx.moveTo(x, y + h / 4);
            ctx.bezierCurveTo(x, y, x - w / 2, y, x - w / 2, y + h / 4);
            ctx.bezierCurveTo(x - w / 2, y + h / 2, x, y + h * 0.7, x, y + h * 0.85);
            ctx.bezierCurveTo(x, y + h * 0.7, x + w / 2, y + h / 2, x + w / 2, y + h / 4);
            ctx.bezierCurveTo(x + w / 2, y, x, y, x, y + h / 4);
            ctx.fill();
        }

        function drawStar(x, y, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(x, y - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(x + Math.cos(rot) * outerRadius, y + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(x + Math.cos(rot) * innerRadius, y + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(x, y - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function draw() {
            if (gameState.orbitActive) {
                drawOrbit();
                return;
            }
            const size = canvas.width / (window.devicePixelRatio || 1);
            const cellSize = size / gameState.gridSize;

            ctx.clearRect(0, 0, size, size);

            // Re-sync glass grid tiles if needed
            const glassContainer = document.getElementById('glass-grid');
            if (glassContainer.children.length !== gameState.gridSize * gameState.gridSize) {
                updateGlassTiles();
            }

            // Sync DOM Glass Tiles with Game State (for perfect alignment)
            const glassTiles = document.querySelectorAll('.glass-tile');
            glassTiles.forEach((tile, i) => {
                tile.classList.remove('tile-active', 'tile-mirror');

                // Hide normal highlighting in TINY mode to avoid double-glow
                if (gameState.chaosEvent !== 'TINY') {
                    if (i === gameState.activeIndex || i === gameState.chaosTarget2) {
                        tile.classList.add('tile-active');
                    }
                }

                if (gameState.chaosEvent === 'MIRROR' && i === gameState.mirrorTarget) {
                    tile.classList.add('tile-mirror');
                }
            });

            // Grid rendering (Canvas side - for TINY objects and overlays)
            for (let i = 0; i < gameState.gridSize * gameState.gridSize; i++) {
                const x = (i % gameState.gridSize) * cellSize;
                const y = Math.floor(i / gameState.gridSize) * cellSize;
                const gap = 6;

                if (gameState.chaosEvent === 'TINY') {
                    if (i === gameState.activeIndex || i === gameState.chaosTarget2) {
                        drawSprites(i, x, y, cellSize, gap, true);
                    } else {
                        drawSprites(i, x, y, cellSize, gap, false);
                    }
                }
            }

            // Draw mirror axis line
            if (gameState.chaosEvent === 'MIRROR' && gameState.mirrorAxis && gameState.mirrorTarget !== -1) {
                ctx.strokeStyle = gameState.mirrorAxisColor === 'red' ? '#ff3b3b' : (gameState.mirrorAxisColor === 'yellow' ? '#ffd700' : '#00ff88');
                ctx.lineWidth = 3; ctx.setLineDash([8, 6]);
                if (gameState.mirrorAxis === 'vertical') {
                    ctx.beginPath(); ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2, size); ctx.stroke();
                } else if (gameState.mirrorAxis === 'horizontal') {
                    ctx.beginPath(); ctx.moveTo(0, size / 2); ctx.lineTo(size, size / 2); ctx.stroke();
                } else if (gameState.mirrorAxis === 'diagonal') {
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(size, size); ctx.stroke();
                }
                ctx.setLineDash([]);
            }

            // Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            if (gameState.active) requestAnimationFrame(draw);
        }

        function drawOrbit() {
            const size = canvas.width / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, size, size);

            const cx = size / 2;
            const cy = size / 2;
            const outerR = size * 0.4;
            const innerR = size * 0.25;

            // Track
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI * 2); ctx.stroke();

            // Target Sector
            gameState.orbitAngle += gameState.orbitSpeed;
            ctx.strokeStyle = THEMES[gameState.stage].color;
            ctx.lineWidth = outerR - innerR;
            ctx.beginPath();
            ctx.arc(cx, cy, (outerR + innerR) / 2, gameState.orbitAngle, gameState.orbitAngle + 0.8);
            ctx.stroke();

            if (gameState.active) requestAnimationFrame(draw);
        }

        function startOrbitEvent() {
            gameState.orbitActive = true;
            gameState.orbitAngle = Math.random() * Math.PI * 2;
            gameState.orbitSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.03 + Math.random() * 0.03);
            gameState.activeIndex = -1;
            gameState.isWaiting = false;
            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
        }

        function checkOrbitHit(x, y) {
            const size = canvas.width / (window.devicePixelRatio || 1);
            const cx = size / 2;
            const cy = size / 2;
            const outerR = size * 0.4;
            const innerR = size * 0.25;

            const dx = x - cx;
            const dy = y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Check if click is within the ring
            if (dist < innerR || dist > outerR) {
                endOrbitEvent(true);
                return;
            }

            // Check angle
            let clickAngle = Math.atan2(dy, dx);
            if (clickAngle < 0) clickAngle += Math.PI * 2;

            let sectorStart = gameState.orbitAngle % (Math.PI * 2);
            if (sectorStart < 0) sectorStart += Math.PI * 2;
            let sectorEnd = (sectorStart + 0.8) % (Math.PI * 2);

            let hit = false;
            if (sectorEnd > sectorStart) {
                hit = clickAngle >= sectorStart && clickAngle <= sectorEnd;
            } else {
                hit = clickAngle >= sectorStart || clickAngle <= sectorEnd;
            }

            if (hit) {
                const bonus = 1000 + gameState.combo * 200;
                gameState.score += bonus;
                gameState.combo++;
                showBadge(`+${bonus}`);
                showFeedback('ORBIT HIT!', THEMES[gameState.stage].color);
                sounds.hit(100);
                // Randomize next sector, increase speed
                gameState.orbitAngle = Math.random() * Math.PI * 2;
                const dir = Math.random() > 0.5 ? 1 : -1;
                gameState.orbitSpeed = dir * (Math.abs(gameState.orbitSpeed) * 1.05 + 0.002);
                updateUI();
            } else {
                endOrbitEvent(true);
            }
        }

        function endOrbitEvent(wasMiss) {
            // In Selection Mode with fixed ORBIT, stay in orbit
            if (gameState.fixedChaos === 'ORBIT') {
                if (wasMiss) {
                    gameState.combo = 0;
                    gameState.time = Math.max(0, gameState.time - 5);
                    showBadge('-5s');
                    sounds.miss();
                    showFeedback('MISS!', '#ff3b3b');
                    document.body.classList.add('error-flash');
                    document.getElementById('game-view').classList.add('shake');
                    setTimeout(() => {
                        document.body.classList.remove('error-flash');
                        document.getElementById('game-view').classList.remove('shake');
                    }, 200);
                    updateUI();
                }
                // Re-randomize sector but stay in orbit
                gameState.orbitAngle = Math.random() * Math.PI * 2;
                gameState.orbitSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.03 + Math.random() * 0.03);
                return;
            }
            // In Entertainment Mode, exit orbit on miss
            gameState.orbitActive = false;
            gameState.chaosEvent = null;
            if (wasMiss) handleError();
            triggerBlock();
        }

        function triggerBlock(immediate = false) {
            if (!gameState.active || gameState.orbitActive) return;
            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);

            gameState.isWaiting = true;
            gameState.activeIndex = -1;
            gameState.chaosTarget2 = -1;

            let nextChaosEvent = gameState.chaosEvent;
            if (gameState.pendingChaosEnd) nextChaosEvent = null;
            if (gameState.pendingChaosStart && gameState.pendingChaosStart !== 'ORBIT') nextChaosEvent = gameState.pendingChaosStart;

            let baseDelay = 1000 - (gameState.hitCount * 15);
            if (nextChaosEvent === 'SPEED') baseDelay /= 3;
            if (nextChaosEvent === 'MIRROR') baseDelay -= (gameState.mirrorConsecutive || 0) * 30;

            const minD = Math.max(nextChaosEvent === 'SPEED' ? 100 : 150, baseDelay);
            const maxD = Math.max(nextChaosEvent === 'SPEED' ? 300 : 400, baseDelay * 2);
            const delay = immediate ? 10 : (Math.random() * (maxD - minD) + minD);

            setTimeout(() => {
                if (!gameState.active || gameState.orbitActive) return;

                // Process pending chaos end
                if (gameState.pendingChaosEnd) {
                    gameState.chaosEvent = null;
                    gameState.trapIndex = -1;
                    gameState.mirrorTarget = -1;
                    document.body.style.transform = 'rotate(0deg)';
                    gameState.pendingChaosEnd = false;
                }

                // Process pending chaos start
                if (gameState.pendingChaosStart) {
                    const ev = gameState.pendingChaosStart;
                    gameState.pendingChaosStart = null;

                    if (ev === 'ORBIT') {
                        gameState.chaosEvent = null;
                        startOrbitEvent();
                        showBadge(I18N[gameState.lang].event_orbit);
                        return; // Skip normal block spawn
                    }

                    gameState.chaosEvent = ev;
                    const t = I18N[gameState.lang];
                    const badgeTxt = ev === 'DOUBLE' ? t.event_double :
                        ev === 'SPEED' ? t.event_speed :
                            ev === 'TINY' ? t.event_tiny :
                                ev === 'MIRROR' ? t.event_mirror : t.event_spin;
                    showBadge(badgeTxt);

                    if (ev === 'SPIN') {
                        document.body.style.transform = `rotate(${(Math.random() - 0.5) * 16}deg)`;
                    }
                }

                gameState.activeIndex = Math.floor(Math.random() * (gameState.gridSize * gameState.gridSize));

                if (gameState.chaosEvent === 'DOUBLE') {
                    let second;
                    do { second = Math.floor(Math.random() * (gameState.gridSize * gameState.gridSize)); }
                    while (second === gameState.activeIndex);
                    gameState.chaosTarget2 = second;
                }

                if (gameState.chaosEvent === 'TINY') {
                    const shapes = ['square', 'circle', 'heart', 'star'];
                    gameState.tinyShape = shapes[Math.floor(Math.random() * shapes.length)];
                }

                // MIRROR mode: randomly spawn mirror target with RED or GREEN axis
                if (gameState.chaosEvent === 'MIRROR') {
                    gameState.activeIndex = -1; // Don't use normal active
                    const g = gameState.gridSize;
                    const total = g * g;
                    gameState.trapIndex = -1; // Not used anymore, just clean

                    const axes = ['vertical', 'horizontal', 'diagonal'];
                    gameState.mirrorAxis = axes[Math.floor(Math.random() * axes.length)];
                    const randC = Math.random();
                    gameState.mirrorAxisColor = randC < 0.15 ? 'red' : (randC < 0.40 ? 'yellow' : 'green');
                    gameState.mirrorTarget = Math.floor(Math.random() * total);

                    if (gameState.trapTimer) clearTimeout(gameState.trapTimer);

                    // If red axis, automatically pop next block after 1s if didn't click
                    if (gameState.mirrorAxisColor === 'red') {
                        gameState.trapTimer = setTimeout(() => {
                            if (gameState.active && gameState.mirrorTarget !== -1) {
                                gameState.mirrorTarget = -1;
                                triggerBlock(true); // Immediate next
                            }
                        }, 1000);
                    }
                }

                gameState.startTime = performance.now();
                gameState.isWaiting = false;
                sounds.tick();

                // 5s Expiry
                gameState.expiryTimer = setTimeout(() => {
                    if (gameState.active && !gameState.isWaiting) {
                        if (gameState.mode === 'SURVIVAL') {
                            handleError();
                        }
                        triggerBlock(true);
                    }
                }, 5000);
            }, delay);
        }

        function handleInput(e) {
            if (!gameState.active || (gameState.isWaiting && !gameState.orbitActive)) return;

            const rect = canvas.getBoundingClientRect();
            const cx_raw = e.clientX || (e.touches && e.touches[0].clientX);
            const cy_raw = e.clientY || (e.touches && e.touches[0].clientY);
            const x = (cx_raw - rect.left) * (canvas.width / rect.width / (window.devicePixelRatio || 1));
            const y = (cy_raw - rect.top) * (canvas.height / rect.height / (window.devicePixelRatio || 1));

            if (gameState.orbitActive) {
                checkOrbitHit(x, y);
                return;
            }

            const cellSize = (canvas.width / (window.devicePixelRatio || 1)) / gameState.gridSize;
            const col = Math.floor(x / cellSize);
            const row = Math.floor(y / cellSize);
            const idx = row * gameState.gridSize + col;

            // MIRROR mode input
            if (gameState.chaosEvent === 'MIRROR') {
                if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);

                if (gameState.mirrorTarget !== -1) {
                    // Clicked during red axis = Error!
                    if (gameState.mirrorAxisColor === 'red') {
                        gameState.mirrorTarget = -1;
                        if (gameState.trapTimer) clearTimeout(gameState.trapTimer);
                        gameState.mirrorConsecutive = 0;
                        gameState.time = Math.max(0, gameState.time - 3);
                        showBadge('-3s');
                        handleError();
                        triggerBlock(true); // Immediate trigger
                        return;
                    }

                    // Green or Yellow Axis: Check expected click position
                    const g = gameState.gridSize;
                    const mRow = Math.floor(gameState.mirrorTarget / g);
                    const mCol = gameState.mirrorTarget % g;
                    let expectedRow, expectedCol;

                    if (gameState.mirrorAxisColor === 'yellow') {
                        // Yellow: directly click the target itself
                        expectedRow = mRow;
                        expectedCol = mCol;
                    } else {
                        // Green: click symmetric position
                        if (gameState.mirrorAxis === 'vertical') {
                            expectedRow = mRow;
                            expectedCol = g - 1 - mCol;
                        } else if (gameState.mirrorAxis === 'horizontal') {
                            expectedRow = g - 1 - mRow;
                            expectedCol = mCol;
                        } else { // diagonal
                            expectedRow = mCol;
                            expectedCol = mRow;
                        }
                    }
                    const expectedIdx = expectedRow * g + expectedCol;

                    if (idx === expectedIdx) {
                        gameState.mirrorConsecutive = (gameState.mirrorConsecutive || 0) + 1;
                        if (gameState.mirrorConsecutive % 10 === 0) {
                            gameState.time = Math.min(60, gameState.time + 5);
                            showBadge('+5s BONUS!');
                        } else {
                            gameState.time = Math.min(60, gameState.time + 1);
                            showBadge('+1s');
                        }
                        const rt = Math.round(performance.now() - gameState.startTime);
                        gameState.mirrorTarget = -1;
                        handleSuccess(rt, x, y, true); // Immediate trigger
                    } else {
                        gameState.mirrorConsecutive = 0;
                        gameState.time = Math.max(0, gameState.time - 3);
                        showBadge('-3s');
                        gameState.mirrorTarget = -1;
                        handleError();
                        triggerBlock(true); // Immediate trigger
                    }
                    return;
                }
                return; // Nothing to click
            }

            // Precision Hitbox for TINY
            if (gameState.chaosEvent === 'TINY' && (idx === gameState.activeIndex || idx === gameState.chaosTarget2)) {
                const cellX = col * cellSize;
                const cellY = row * cellSize;
                const centerX = cellX + cellSize / 2;
                const centerY = cellY + cellSize / 2;
                const dist = Math.sqrt((x - centerX) ** 2 + (y - centerY) ** 2);
                const drawSize = (cellSize - 6 * 2 - 4) * 0.35;
                if (dist > drawSize / 2) {
                    handleError();
                    gameState.activeIndex = -1;
                    gameState.chaosTarget2 = -1;
                    triggerBlock(true);
                    return;
                }
            }

            if (idx === gameState.activeIndex && gameState.activeIndex !== -1) {
                const rt = Math.round(performance.now() - gameState.startTime);
                if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
                gameState.activeIndex = -1; // Clear to prevent double click
                handleSuccess(rt, x, y);
            } else if (idx === gameState.chaosTarget2 && gameState.chaosTarget2 !== -1) {
                const rt = Math.round(performance.now() - gameState.startTime);
                if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
                gameState.chaosTarget2 = -1;
                handleSuccess(rt, x, y);
            } else {
                handleError();
                gameState.activeIndex = -1;
                gameState.chaosTarget2 = -1;
                triggerBlock(true);
            }
        }

        function handleSuccess(rt, x, y, immediateNext = false) {
            sounds.hit(rt);
            gameState.hitCount++;
            gameState.totalHits++;
            gameState.combo++;
            if (rt < gameState.bestReaction) gameState.bestReaction = rt;

            // Scoring
            const base = Math.max(10, 1000 - rt);
            gameState.score += base * gameState.combo;

            // FX
            const themeColor = THEMES[gameState.stage].color;
            for (let i = 0; i < 10; i++) particles.push(new Particle(x, y, themeColor));

            if (rt < 200) showBadge('⚡ LIGHTNING');
            else if (rt < 250) showBadge('🔥 ELITE');

            showFeedback(`${rt}ms`, rt < 300 ? '#00ff88' : rt < 500 ? '#ffd700' : '#ff3366', x, y);

            // Level Progression (Adventure)
            if (gameState.mode === 'ADVENTURE' && gameState.hitCount % 15 === 0 && gameState.stage < 4) {
                gameState.stage++;
                gameState.gridSize = THEMES[gameState.stage].size;
                document.documentElement.style.setProperty('--stage-color', THEMES[gameState.stage].color);
                showBadge(`LEVEL ${gameState.stage}`);
            }

            updateUI();

            // Time Reward (Cap at 60s)
            if (gameState.active && gameState.chaosEvent !== 'MIRROR') {
                if (gameState.mode === 'ADVENTURE' || gameState.mode === 'ENTERTAINMENT' || gameState.mode === 'SELECTION') {
                    gameState.time = Math.min(60, gameState.time + 1);
                }
            }

            // Spin re-tilt on each hit
            if (gameState.chaosEvent === 'SPIN') {
                const angle = (Math.random() - 0.5) * 16; // -8 to 8 deg
                document.body.style.transform = `rotate(${angle}deg)`;
            }

            // If it was a double target and one is still active, don't trigger new block yet
            if (gameState.activeIndex === -1 && gameState.chaosTarget2 === -1) {
                triggerBlock(immediateNext);
            }
        }

        function handleError() {
            if (gameState.isWaiting) return;
            sounds.miss();
            gameState.combo = 0;

            if (gameState.mode === 'SURVIVAL') {
                gameState.lives--;
                updateLives();
                if (gameState.lives <= 0) gameOver();
            } else if (gameState.mode === 'ENTERTAINMENT') {
                gameState.time = Math.max(0, gameState.time - 5);
                showBadge('-5s');
            } else {
                gameState.score = Math.max(0, gameState.score - 1000);
            }

            document.body.classList.add('error-flash');
            document.getElementById('game-view').classList.add('shake');
            showFeedback('MISS!', '#ff3b3b');
            setTimeout(() => {
                document.body.classList.remove('error-flash');
                document.getElementById('game-view').classList.remove('shake');
            }, 200);
            updateUI();
        }

        function showBadge(txt) {
            const b = document.createElement('div');
            b.className = 'badge';
            b.textContent = txt;
            b.style.color = THEMES[gameState.stage].color;
            document.getElementById('badge-container').appendChild(b);
            setTimeout(() => b.remove(), 1000);
        }

        function showFeedback(txt, color, x, y) {
            const f = document.createElement('div');
            f.className = 'score-popup';
            f.textContent = txt;
            f.style.color = color;
            if (x !== undefined && y !== undefined) {
                f.style.left = x + 'px';
                f.style.top = y + 'px';
            } else {
                f.style.left = '50%';
                f.style.top = '50%';
                f.style.transform = 'translate(-50%, -50%)';
            }
            document.getElementById('game-view').appendChild(f);
            setTimeout(() => f.remove(), 600);
        }

        function updateUI() {
            document.getElementById('score-main').textContent = gameState.score.toLocaleString();
            document.getElementById('combo-val').textContent = gameState.combo;
            document.getElementById('best-val').textContent = gameState.bestReaction === Infinity ? '--' : gameState.bestReaction;

            if (gameState.active) {
                const t = I18N[gameState.lang];
                let label = gameState.mode === 'ADVENTURE' ? t.adventure :
                    gameState.mode === 'SURVIVAL' ? t.survival :
                        gameState.mode === 'SELECTION' ? t.selection : t.entertainment;
                document.getElementById('mode-label').textContent = label;
            }

            if (gameState.mode === 'ADVENTURE' || gameState.mode === 'ENTERTAINMENT' || gameState.mode === 'SELECTION') {
                const maxTime = gameState.mode === 'ADVENTURE' ? 60 : (gameState.mode === 'SELECTION' ? 30 : 180);
                const fill = Math.max(0, (gameState.time / maxTime) * 100);
                document.getElementById('status-fill').style.width = fill + '%';
            }
        }

        function updateLives() {
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((h, i) => {
                if (i >= gameState.lives) h.classList.add('lost');
                else h.classList.remove('lost');
            });
        }

        function updateGlassTiles() {
            const container = document.getElementById('glass-grid');
            const g = gameState.gridSize || 4;
            container.style.gridTemplateColumns = `repeat(${g}, 1fr)`;
            container.style.gridTemplateRows = `repeat(${g}, 1fr)`;
            container.innerHTML = '';
            for (let i = 0; i < g * g; i++) {
                const tile = document.createElement('div');
                tile.className = 'glass-tile';
                container.appendChild(tile);
            }
            if (gameState.orbitActive) {
                document.getElementById('game-view').classList.add('orbit-hider');
            } else {
                document.getElementById('game-view').classList.remove('orbit-hider');
            }
        }

        // --- FLOW ---
        async function startGame(mode, fixedType = null) {
            // 1. Start Menu Fadeout (Highest priority)
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = 0;
            setTimeout(() => overlay.style.display = 'none', 400);

            // 2. STAGGERED HUD Expansion
            await new Promise(r => setTimeout(r, 80));
            const gs = document.getElementById('game-stats');
            gs.style.maxHeight = '220px'; // Slightly more breathing room
            gs.style.visibility = 'visible';
            gs.style.opacity = '0.3';

            // 3. Init State
            gameState = {
                active: false,
                mode: mode,
                score: 0,
                combo: 0,
                stage: mode === 'SELECTION' ? 2 : 1,
                gridSize: (mode === 'ENTERTAINMENT' || mode === 'SELECTION') ? 5 : 4,
                lives: 3,
                time: mode === 'ENTERTAINMENT' ? 180 : (mode === 'SELECTION' ? 30 : 60),
                activeIndex: -1,
                startTime: 0,
                isWaiting: false,
                bestReaction: Infinity,
                hitCount: 0,
                totalHits: gameState.totalHits || 0,
                muted: gameState.muted,
                lang: gameState.lang,
                chaosEvent: fixedType === 'ORBIT' ? null : fixedType,
                pendingChaosStart: null,
                pendingChaosEnd: false,
                chaosTarget2: -1,
                fixedChaos: fixedType,
                orbitActive: fixedType === 'ORBIT', // Set correctly for Orbit mode visual
                isCountDown: true, // Tracking countdown state
                orbitAngle: 0,
                orbitSpeed: 0.05
            };

            updateGlassTiles();

            // 3. UI Labels and visibility (Before Countdown)
            const t = I18N.CN;
            let label = mode === 'ADVENTURE' ? t.adventure :
                mode === 'SURVIVAL' ? t.survival :
                    mode === 'SELECTION' ? t.selection : t.entertainment;
            document.getElementById('mode-label').textContent = label;
            document.getElementById('mode-label').style.display = 'block';
            document.getElementById('lives-container').style.display = mode === 'SURVIVAL' ? 'flex' : 'none';
            document.getElementById('status-bar').style.display = (mode === 'ADVENTURE' || mode === 'ENTERTAINMENT' || mode === 'SELECTION') ? 'block' : 'none';
            document.documentElement.style.setProperty('--stage-color', THEMES[gameState.stage].color);
            document.getElementById('btn-quit').style.display = 'flex';

            updateLives();
            updateUI();
            draw(); // Draw immediately so user sees the correct mode layout during countdown

            // 4. Countdown
            const cd = document.getElementById('countdown');
            cd.style.display = 'block';
            for (let i = 3; i > 0; i--) {
                if (!gameState.isCountDown) return;
                cd.textContent = i;
                sounds.count(440 + (3 - i) * 220);
                await new Promise(r => setTimeout(r, 700));
            }
            if (!gameState.isCountDown) return;
            cd.textContent = "GO!"; sounds.count(1320);
            await new Promise(r => setTimeout(r, 400));
            if (!gameState.isCountDown) return;
            cd.style.display = 'none';
            gameState.isCountDown = false;

            // 5. Final Activation
            gameState.active = true;
            gs.style.opacity = '1'; // Full visibility

            if (fixedType === 'ORBIT') startOrbitEvent();
            if (fixedType === 'SPIN') document.body.style.transform = 'rotate(5deg)';

            if (mode === 'ADVENTURE' || mode === 'ENTERTAINMENT' || mode === 'SELECTION') startTimer();
            if (mode === 'ENTERTAINMENT') startChaosManager();

            draw();
            if (!gameState.orbitActive) triggerBlock();
        }

        function startTimer() {
            const timer = setInterval(() => {
                if (!gameState.active) { clearInterval(timer); return; }
                gameState.time--;
                updateUI();
                if (gameState.time <= 0) {
                    clearInterval(timer);
                    gameOver();
                }
            }, 1000);
        }

        function startChaosManager() {
            const chaosLoop = setInterval(() => {
                if (!gameState.active || gameState.mode !== 'ENTERTAINMENT') { clearInterval(chaosLoop); return; }

                const events = ['DOUBLE', 'SPEED', 'TINY', 'SPIN', 'ORBIT', 'MIRROR'];
                gameState.pendingChaosStart = events[Math.floor(Math.random() * events.length)];

                setTimeout(() => {
                    gameState.pendingChaosEnd = true;
                }, 6000);

            }, 12000);
        }

        function gameOver() {
            gameState.active = false;
            gameState.orbitActive = false;
            gameState.trapIndex = -1;
            gameState.mirrorTarget = -1;
            if (gameState.trapTimer) clearTimeout(gameState.trapTimer);
            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
            document.body.style.transform = 'rotate(0deg)';
            document.getElementById('btn-quit').style.display = 'none';
            const gs1 = document.getElementById('game-stats');
            gs1.style.maxHeight = '0';
            gs1.style.visibility = 'hidden';
            gs1.style.opacity = '0';
            saveStats();
            sounds.gameOver();

            const goModal = document.getElementById('game-over-modal');
            goModal.style.display = 'flex';
            const t = I18N.CN;
            document.getElementById('go-title').textContent = t.gameover;
            document.getElementById('go-score').textContent = t.result + ": " + gameState.score.toLocaleString();
            document.getElementById('btn-play-again').textContent = '再来一局';
            document.getElementById('btn-go-home').textContent = '回到主页';
            document.getElementById('mode-label').textContent = t.gameover;
            document.getElementById('mode-label').style.display = 'block';
        }

        function playAgain() {
            document.getElementById('game-over-modal').style.display = 'none';
            let m = gameState.mode;
            let sub = gameState.fixedChaos;
            startGame(m, sub);
        }

        function goToMenu() {
            document.getElementById('game-over-modal').style.display = 'none';
            quitGame();
        }

        function quitGame() {
            gameState.active = false;
            gameState.isCountDown = false;
            document.getElementById('countdown').style.display = 'none';
            gameState.orbitActive = false;
            gameState.trapIndex = -1;
            gameState.mirrorTarget = -1;
            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
            if (gameState.trapTimer) clearTimeout(gameState.trapTimer);
            document.body.style.transform = 'rotate(0deg)';

            document.getElementById('btn-quit').style.display = 'none';
            const gs2 = document.getElementById('game-stats');
            gs2.style.maxHeight = '0';
            gs2.style.visibility = 'hidden';
            gs2.style.opacity = '0';

            // clear canvas
            const dpr = window.devicePixelRatio || 1;
            ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = 1, 10);

            const t = I18N.CN;
            document.getElementById('menu-title').textContent = t.title;
            document.getElementById('mode-label').style.display = 'none';
        }

        function saveStats() {
            let history = JSON.parse(localStorage.getItem('gameHistory') || '{}');
            let m = gameState.mode;
            let sub = gameState.fixedChaos;
            let key = sub ? m + '_' + sub : m;

            if (!history[key]) history[key] = { hiScore: 0, hiDate: '', maxCombo: 0, comboDate: '' };
            let now = new Date().toLocaleDateString();

            if (gameState.score > history[key].hiScore) {
                history[key].hiScore = gameState.score;
                history[key].hiDate = now;
            }
            if (gameState.combo > history[key].maxCombo) {
                history[key].maxCombo = gameState.combo;
                history[key].comboDate = now;
            }
            localStorage.setItem('gameHistory', JSON.stringify(history));
        }

        function showHistory() {
            document.getElementById('history-modal').style.display = 'flex';
            const hc = document.getElementById('history-content');
            let history = JSON.parse(localStorage.getItem('gameHistory') || '{}');

            const modeNames = {
                'ADVENTURE': '冒险模式',
                'SURVIVAL': '生存模式',
                'ENTERTAINMENT': '娱乐混战',
                'SELECTION_DOUBLE': '自选模式: 双重目标',
                'SELECTION_SPEED': '自选模式: 极速加倍',
                'SELECTION_TINY': '自选模式: 微缩方块',
                'SELECTION_SPIN': '自选模式: 空间扭曲',
                'SELECTION_ORBIT': '自选模式: 轨道圆环',
                'SELECTION_MIRROR': '自选模式: 奇妙模式'
            };

            let globalMaxCombo = 0;
            let globalMaxComboDate = '';
            let globalMaxComboMode = '';

            for (let k in history) {
                let d = history[k];
                if (d.maxCombo > globalMaxCombo) {
                    globalMaxCombo = d.maxCombo;
                    globalMaxComboDate = d.comboDate;
                    globalMaxComboMode = modeNames[k] || k;
                }
            }

            let html = '';

            if (globalMaxCombo > 0) {
                html += `<div style="margin-bottom: 15px; padding: 12px; border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 8px; background: rgba(255, 215, 0, 0.05); text-align: center;">
                            <strong style="color: var(--warning-color); font-size: 1.1rem; text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);">🌟 全局最高连击 🌟</strong><br>
                            <span style="font-size: 2rem; font-weight: 900; color: var(--primary-color); text-shadow: 0 0 15px rgba(0,243,255,0.6);">${globalMaxCombo}</span><br>
                            <span style="font-size: 0.8rem; color: var(--text-muted);">(${globalMaxComboMode} - ${globalMaxComboDate})</span>
                          </div>`;
            }

            for (let k in history) {
                let d = history[k];
                let name = modeNames[k] || k;
                html += `<div style="margin-bottom: 10px; padding: 12px; border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 8px; background: rgba(0, 243, 255, 0.03);">
                            <strong style="color: #00f3ff;">${name}</strong><br>
                            最高得分: ${d.hiScore} (${d.hiDate || 'N/A'})
                         </div>`;
            }
            if (Object.keys(history).length === 0) html = '暂无历史记录';
            hc.innerHTML = html;
        }

        function hideHistory() {
            document.getElementById('history-modal').style.display = 'none';
        }

        function loadStats() {
            // Not needed in standby HUD
        }

        // --- AUDIO ---
        function initAudio() {
            const savedMuted = localStorage.getItem('muted') === 'true';
            setMuted(savedMuted);
        }

        function setMuted(muted) {
            gameState.muted = muted;
            localStorage.setItem('muted', muted);
        }

        // --- LANGUAGE ---
        function initLang() {
            gameState.lang = 'CN';
            applyLang();
        }

        function applyLang() {
            const t = I18N.CN;
            const titleEl = document.getElementById('menu-title');
            if (titleEl) titleEl.textContent = t.title;
            const advEl = document.getElementById('txt-adv');
            if (advEl) advEl.textContent = t.adventure;
            const survEl = document.getElementById('txt-surv');
            if (survEl) survEl.textContent = t.survival;
            const entEl = document.getElementById('txt-ent');
            if (entEl) entEl.textContent = t.entertainment;
            const selEl = document.getElementById('txt-sel');
            if (selEl) selEl.textContent = t.selection;

            const selBtns = document.getElementById('sel-menu').querySelectorAll('.sel-btn');
            if (selBtns.length >= 6) {
                selBtns[0].textContent = t.sel_double;
                selBtns[1].textContent = t.sel_speed;
                selBtns[2].textContent = t.sel_tiny;
                selBtns[3].textContent = t.sel_spin;
                selBtns[4].textContent = t.sel_orbit;
                selBtns[5].textContent = t.sel_mirror;
            }

            // Stats labels
            const metaStats = document.getElementById('meta-stats').children;
            if (metaStats.length >= 2) {
                metaStats[0].innerHTML = `${t.best}: <span id="best-val">${gameState.bestReaction === Infinity ? '--' : gameState.bestReaction}</span>ms`;
                metaStats[1].innerHTML = `${t.combo}: <span id="combo-val">${gameState.combo}</span>`;
            }
        }

        function showSelMenu() {
            document.querySelector('.btn-group').style.display = 'none';
            document.getElementById('sel-menu').style.display = 'flex';
        }

        function hideSelMenu() {
            document.getElementById('sel-menu').style.display = 'none';
            document.querySelector('.btn-group').style.display = 'flex';
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });
        window.addEventListener('resize', initCanvas);

        loadStats();
        initAudio();
        initLang();
        initCanvas();
    </script>
</body>

</html>
