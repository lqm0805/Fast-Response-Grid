<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速反应网格 - 强化版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --grid-color: #1a1a1a;
            --active-color: #00f2ff;
            --text-color: #ffffff;
            --accent-color: #ff00ea;
            --error-color: #ff3b3b;
            --score-color: #ffd700;
            --stage-color: #00f2ff;
            --overlay-bg: rgba(0, 0, 0, 0.9);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.2);
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --grid-color: #e5e5e7;
            --active-color: #0071e3;
            --text-color: #1d1d1f;
            --accent-color: #ff3b30;
            --error-color: #ff3b3b;
            --score-color: #ff9500;
            --stage-color: #0071e3;
            --overlay-bg: rgba(255, 255, 255, 0.9);
            --btn-bg: rgba(0, 0, 0, 0.05);
            --btn-border: rgba(0, 0, 0, 0.2);
        }

        /* --- PREMIUM THEME (Phase 14) --- */
        [data-theme="premium"] {
            --bg-color: #0f172a;
            /* Deep slate */
            --grid-color: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            /* Vibrant neon palette */
            --active-color: #0ea5e9;
            --accent-color: #ec4899;
            --error-color: #ef4444;
            --score-color: #fbbf24;
            --stage-color: #0ea5e9;

            /* Glassmorphism settings */
            --overlay-bg: rgba(15, 23, 42, 0.6);
            --btn-bg: rgba(255, 255, 255, 0.03);
            --btn-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(16px);
            --glow-spread: 0 0 20px rgba(14, 165, 233, 0.5);
        }

        body[data-theme="premium"] {
            font-family: 'Outfit', sans-serif;
        }

        /* Animated dynamic background for premium mode */
        body[data-theme="premium"]::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 30%);
            background-size: 100% 100%;
            animation: premiumBgDrift 20s linear infinite alternate;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes premiumBgDrift {
            0% {
                transform: rotate(0deg) scale(1);
            }

            100% {
                transform: rotate(360deg) scale(1.2);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.15s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.error-flash {
            background-color: #300;
        }

        #hud {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .hud-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #mode-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--stage-color);
            border: 1px solid var(--stage-color);
            padding: 2px 8px;
            border-radius: 4px;
        }

        #score-main {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--score-color);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        #meta-stats {
            display: flex;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        #status-bar {
            width: 100%;
            height: 4px;
            background: #222;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        #status-fill {
            height: 100%;
            width: 100%;
            background: var(--stage-color);
            transition: width 0.1s linear, background-color 0.5s;
            box-shadow: 0 0 10px var(--stage-color);
        }

        #lives-container {
            display: flex;
            gap: 5px;
        }

        .heart {
            color: var(--error-color);
            font-size: 1.2rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart.lost {
            transform: scale(0);
            opacity: 0;
        }

        #game-view {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            max-width: 500px;
            max-height: 500px;
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.4s;
        }

        [data-theme="premium"] #overlay {
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .menu-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: 10px;
            background: linear-gradient(45deg, #00f2ff, #ff00ea);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 240px;
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-color);
            padding: 16px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        [data-theme="premium"] button {
            backdrop-filter: blur(4px);
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        button:hover {
            border-color: var(--active-color);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        [data-theme="premium"] button:hover {
            box-shadow: var(--glow-spread);
            background: rgba(14, 165, 233, 0.15);
        }

        button.primary {
            border-color: var(--active-color);
            color: var(--active-color);
        }

        [data-theme="premium"] button.primary {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2) 0%, rgba(236, 72, 153, 0.1) 100%);
        }

        button.primary:hover {
            background: var(--active-color);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        [data-theme="premium"] button.primary:hover {
            background: linear-gradient(135deg, #0ea5e9, #ec4899);
            color: #fff;
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.5);
            border-color: transparent;
        }

        .sel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 280px;
            margin-top: 10px;
        }

        .sel-btn {
            padding: 10px;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .back-btn {
            margin-top: 20px;
            font-size: 0.7rem !important;
            opacity: 0.7;
            border: none !important;
            text-decoration: underline;
            background: none !important;
            color: var(--text-color);
            cursor: pointer;
        }

        #sel-menu {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .btn-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
        }

        .style-toggle-btn {
            margin-top: 15px;
            font-size: 0.8rem !important;
            padding: 8px 16px;
            border-radius: 20px !important;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10rem;
            font-weight: 900;
            color: var(--text-color);
            z-index: 150;
            pointer-events: none;
            display: none;
        }

        #badge-container {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 50;
        }

        .badge {
            font-size: 2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            animation: badgePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes badgePop {
            0% {
                transform: scale(0.5);
                opacity: 0;
                filter: blur(10px);
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
                filter: blur(0);
            }

            100% {
                transform: scale(1) translateY(-50px);
                opacity: 0;
            }
        }

        #feedback {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .stats-footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.5;
            text-align: center;
            line-height: 1.6;
        }

        .icon-btn {
            padding: 4px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--text-color);
            transition: all 0.2s;
        }

        .icon-btn:hover {
            border-color: var(--active-color);
            transform: scale(1.1);
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-6px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(6px, 0, 0);
            }
        }
    </style>
</head>

<body>
    <div id="hud">
        <div class="hud-top">
            <div id="mode-label">STANDBY</div>
            <div id="lives-container" style="display: none;">
                <span class="heart">❤</span><span class="heart">❤</span><span class="heart">❤</span>
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="btn-quit" class="icon-btn" style="display: none;" onclick="quitGame()">🔙</button>
                <button id="audio-toggle" class="icon-btn">🔊</button>
                <button id="lang-toggle" class="icon-btn">EN</button>
                <button id="theme-toggle" class="icon-btn">🌙</button>
            </div>
        </div>
        <div id="score-main">0</div>
        <div id="meta-stats">
            <div>BEST: <span id="best-val">--</span>ms</div>
            <div>COMBO: <span id="combo-val">0</span></div>
        </div>
        <div id="status-bar">
            <div id="status-fill"></div>
        </div>
    </div>

    <div id="game-view">
        <canvas id="gameCanvas"></canvas>
        <div id="countdown"></div>
        <div id="badge-container"></div>
        <div id="feedback"></div>

        <div id="overlay">
            <div class="menu-title" id="menu-title">GRID SPEED</div>
            <div class="btn-group">
                <button class="primary" id="btn-adventure" onclick="startGame('ADVENTURE')">
                    <span class="btn-icon">🌌</span> <span id="txt-adv">ADVENTURE</span>
                </button>
                <button class="primary" id="btn-survival" onclick="startGame('SURVIVAL')">
                    <span class="btn-icon">⚡</span> <span id="txt-surv">SURVIVAL</span>
                </button>
                <button class="primary" id="btn-entertainment" onclick="startGame('ENTERTAINMENT')">
                    <span class="btn-icon">🎭</span> <span id="txt-ent">ENTERTAINMENT</span>
                </button>
                <button id="btn-selection-open" onclick="showSelMenu()">
                    <span class="btn-icon">⚙️</span> <span id="txt-sel">SELECTION MODE</span>
                </button>
                <button id="btn-style-toggle" class="style-toggle-btn" onclick="toggleStyle()">
                    <span class="btn-icon">✨</span> <span id="txt-style">STYLE: MINIMAL</span>
                </button>
            </div>
            <div id="sel-menu">
                <div class="sel-grid">
                    <button class="sel-btn" onclick="startGame('SELECTION', 'DOUBLE')">DOUBLE VISION</button>
                    <button class="sel-btn" onclick="startGame('SELECTION', 'SPEED')">HYPER SPEED</button>
                    <button class="sel-btn" onclick="startGame('SELECTION', 'TINY')">TINY SHAPES</button>
                    <button class="sel-btn" onclick="startGame('SELECTION', 'SPIN')">GRID SPIN</button>
                    <button class="sel-btn" onclick="startGame('SELECTION', 'ORBIT')">ORBIT RING</button>
                    <button class="sel-btn" onclick="startGame('SELECTION', 'MIRROR')"
                        style="grid-column: span 2">MIRROR</button>
                </div>
                <button class="back-btn" onclick="hideSelMenu()">BACK</button>
            </div>
            <div class="stats-footer" id="global-stats">
                <span id="label-clicks">LIFETIME CLICKS</span>: <span id="total-clicks">0</span><br>
                <span id="label-hi-score">HI-SCORE</span>: <span id="hi-score">0</span>
            </div>
        </div>
    </div>

    <script>
        // --- CORE SYSTEM ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let gameState = {
            active: false,
            mode: '',
            score: 0,
            combo: 0,
            stage: 1,
            gridSize: 4,
            lives: 3,
            time: 60,
            activeIndex: -1,
            startTime: 0,
            isWaiting: false,
            bestReaction: Infinity,
            hitCount: 0,
            totalHits: 0,
            muted: localStorage.getItem('muted') === 'true',
            lang: localStorage.getItem('lang') || 'EN',
            visualTheme: localStorage.getItem('visualTheme') || 'MINIMAL',
            chaosEvent: null,
            chaosTarget2: -1,
            expiryTimer: null,
            orbitAngle: 0,
            orbitSpeed: 0.05,
            orbitTargetAngle: 0,
            orbitActive: false,
            tinyShape: 'square',
            fixedChaos: null,
            mirrorAxis: null,
            mirrorTarget: -1,
            trapIndex: -1,
            trapTimer: null
        };

        const I18N = {
            EN: {
                title: 'GRID SPEED',
                adventure: 'ADVENTURE',
                survival: 'SURVIVAL',
                entertainment: 'ENTERTAINMENT',
                best: 'BEST',
                combo: 'COMBO',
                clicks: 'LIFETIME CLICKS',
                hiscore: 'HI-SCORE',
                gameover: 'GAME OVER',
                standby: 'STANDBY',
                result: 'RESULT',
                event_double: 'DOUBLE VISION!!',
                event_speed: 'HYPER SPEED!!',
                event_tiny: 'TINY SHAPES!!',
                event_spin: 'GRID SPIN!!',
                event_orbit: 'ORBIT RING!!',
                selection: 'SELECTION MODE',
                sel_double: 'DOUBLE VISION',
                sel_speed: 'HYPER SPEED',
                sel_tiny: 'TINY SHAPES',
                sel_spin: 'GRID SPIN',
                sel_orbit: 'ORBIT RING',
                sel_mirror: 'MIRROR',
                event_mirror: 'MIRROR MODE!!',
                style_toggle: 'STYLE: ',
                style_min: 'MINIMAL',
                style_premium: 'PREMIUM'
            },
            CN: {
                title: '极速反应',
                adventure: '冒险模式',
                survival: '生存模式',
                entertainment: '娱乐混战',
                best: '最佳反应',
                combo: '连击',
                clicks: '总点击数',
                hiscore: '最高分',
                gameover: '游戏结束',
                standby: '准备',
                result: '最终得分',
                event_double: '双重目标!!',
                event_speed: '极速加倍!!',
                event_tiny: '微缩方块!!',
                event_spin: '空间扭曲',
                event_orbit: '轨道圆环',
                selection: '自选模式',
                sel_double: '双重目标',
                sel_speed: '极速加倍',
                sel_tiny: '微缩方块',
                sel_spin: '空间扭曲',
                sel_orbit: '轨道圆环',
                sel_mirror: '奇妙模式',
                event_mirror: '奇妙模式!!',
                style_toggle: '风格: ',
                style_min: '极简',
                style_premium: '高级'
            }
        };

        const THEMES = {
            1: { color: '#00f2ff', size: 4 }, // Cyan
            2: { color: '#ffd700', size: 5 }, // Gold
            3: { color: '#ff00ea', size: 6 }, // Magenta
            4: { color: '#ff3b3b', size: 7 }  // Red
        };

        // --- AUDIO ---
        function playTone(freq, type, duration, volume = 0.1) {
            if (gameState.muted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            tick: () => playTone(300 + (gameState.stage * 100), 'sine', 0.1),
            hit: (ms) => {
                const p = Math.max(400, 1200 - ms);
                playTone(p, 'sine', 0.2, 0.15);
                if (ms < 200) playTone(p * 1.5, 'triangle', 0.3, 0.1);
            },
            miss: () => { playTone(150, 'sawtooth', 0.3, 0.2); playTone(100, 'square', 0.2, 0.1); },
            count: (f) => playTone(f, 'sine', 0.1, 0.1),
            gameOver: () => {
                playTone(523.25, 'sine', 0.1, 0.1); // C5
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); // E5
                setTimeout(() => playTone(783.99, 'sine', 0.3, 0.1), 200); // G5
            }
        };

        // --- PARTICLES ---
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.04;
            }
        }
        let particles = [];

        // --- RENDER ---
        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.7, 500);
            canvas.width = size * dpr; canvas.height = size * dpr;
            ctx.scale(dpr, dpr);
            draw();
        }

        function drawSprites(i, x, y, size, gap, isActive) {
            const themeColor = THEMES[gameState.stage].color;
            ctx.fillStyle = isActive ? themeColor : '#222';

            if (isActive) {
                ctx.shadowBlur = 15; ctx.shadowColor = themeColor;
            }

            let drawSize = size - gap * 2 - 4;
            let centerX = x + size / 2;
            let centerY = y + size / 2;

            if (gameState.chaosEvent === 'TINY') {
                drawSize *= 0.35;
                const shape = gameState.tinyShape || 'square';

                if (shape === 'square') {
                    ctx.fillRect(centerX - drawSize / 2, centerY - drawSize / 2, drawSize, drawSize);
                } else if (shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, drawSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (shape === 'heart') {
                    drawHeart(centerX, centerY, drawSize);
                } else if (shape === 'star') {
                    drawStar(centerX, centerY, 5, drawSize / 2, drawSize / 4);
                }
            } else {
                ctx.fillRect(x + gap + 2, y + gap + 2, drawSize, drawSize);
            }
            ctx.shadowBlur = 0;
        }

        function drawHeart(x, y, size) {
            const w = size;
            const h = size;
            ctx.beginPath();
            ctx.moveTo(x, y + h / 4);
            ctx.bezierCurveTo(x, y, x - w / 2, y, x - w / 2, y + h / 4);
            ctx.bezierCurveTo(x - w / 2, y + h / 2, x, y + h * 0.7, x, y + h * 0.85);
            ctx.bezierCurveTo(x, y + h * 0.7, x + w / 2, y + h / 2, x + w / 2, y + h / 4);
            ctx.bezierCurveTo(x + w / 2, y, x, y, x, y + h / 4);
            ctx.fill();
        }

        function drawStar(x, y, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(x, y - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(x + Math.cos(rot) * outerRadius, y + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(x + Math.cos(rot) * innerRadius, y + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(x, y - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        function draw() {
            if (gameState.orbitActive) {
                drawOrbit();
                return;
            }
            const size = canvas.width / (window.devicePixelRatio || 1);
            const cellSize = size / gameState.gridSize;

            ctx.clearRect(0, 0, size, size);

            // Grid
            for (let i = 0; i < gameState.gridSize * gameState.gridSize; i++) {
                const x = (i % gameState.gridSize) * cellSize;
                const y = Math.floor(i / gameState.gridSize) * cellSize;
                const gap = 6;

                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + gap, y + gap, cellSize - gap * 2, cellSize - gap * 2);

                if (i === gameState.activeIndex || i === gameState.chaosTarget2) {
                    drawSprites(i, x, y, cellSize, gap, true);
                } else if (gameState.chaosEvent === 'TINY') {
                    drawSprites(i, x, y, cellSize, gap, false);
                }

                // MIRROR: draw target (green)
                if (gameState.chaosEvent === 'MIRROR') {
                    if (i === gameState.mirrorTarget) {
                        ctx.fillStyle = '#00ff88';
                        ctx.shadowBlur = 15; ctx.shadowColor = '#00ff88';
                        ctx.fillRect(x + gap + 2, y + gap + 2, cellSize - gap * 2 - 4, cellSize - gap * 2 - 4);
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // Draw mirror axis line
            if (gameState.chaosEvent === 'MIRROR' && gameState.mirrorAxis && gameState.mirrorTarget !== -1) {
                ctx.strokeStyle = gameState.mirrorAxisColor === 'red' ? '#ff3b3b' : (gameState.mirrorAxisColor === 'yellow' ? '#ffd700' : '#00ff88');
                ctx.lineWidth = 3; ctx.setLineDash([8, 6]);
                if (gameState.mirrorAxis === 'vertical') {
                    ctx.beginPath(); ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2, size); ctx.stroke();
                } else if (gameState.mirrorAxis === 'horizontal') {
                    ctx.beginPath(); ctx.moveTo(0, size / 2); ctx.lineTo(size, size / 2); ctx.stroke();
                } else if (gameState.mirrorAxis === 'diagonal') {
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(size, size); ctx.stroke();
                }
                ctx.setLineDash([]);
            }

            // Particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            if (gameState.active) requestAnimationFrame(draw);
        }

        function drawOrbit() {
            const size = canvas.width / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, size, size);

            const cx = size / 2;
            const cy = size / 2;
            const outerR = size * 0.4;
            const innerR = size * 0.25;

            // Track
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI * 2); ctx.stroke();

            // Target Sector
            gameState.orbitAngle += gameState.orbitSpeed;
            ctx.strokeStyle = THEMES[gameState.stage].color;
            ctx.lineWidth = outerR - innerR;
            ctx.beginPath();
            ctx.arc(cx, cy, (outerR + innerR) / 2, gameState.orbitAngle, gameState.orbitAngle + 0.8);
            ctx.stroke();

            if (gameState.active) requestAnimationFrame(draw);
        }

        function startOrbitEvent() {
            gameState.orbitActive = true;
            gameState.orbitAngle = Math.random() * Math.PI * 2;
            gameState.orbitSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.03 + Math.random() * 0.03);
            gameState.activeIndex = -1;
            gameState.isWaiting = false;
            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
        }

        function checkOrbitHit(x, y) {
            const size = canvas.width / (window.devicePixelRatio || 1);
            const cx = size / 2;
            const cy = size / 2;
            const outerR = size * 0.4;
            const innerR = size * 0.25;

            const dx = x - cx;
            const dy = y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Check if click is within the ring
            if (dist < innerR || dist > outerR) {
                endOrbitEvent(true);
                return;
            }

            // Check angle
            let clickAngle = Math.atan2(dy, dx);
            if (clickAngle < 0) clickAngle += Math.PI * 2;

            let sectorStart = gameState.orbitAngle % (Math.PI * 2);
            if (sectorStart < 0) sectorStart += Math.PI * 2;
            let sectorEnd = (sectorStart + 0.8) % (Math.PI * 2);

            let hit = false;
            if (sectorEnd > sectorStart) {
                hit = clickAngle >= sectorStart && clickAngle <= sectorEnd;
            } else {
                hit = clickAngle >= sectorStart || clickAngle <= sectorEnd;
            }

            if (hit) {
                const bonus = 1000 + gameState.combo * 200;
                gameState.score += bonus;
                gameState.combo++;
                showBadge(`+${bonus}`);
                showFeedback('ORBIT HIT!', THEMES[gameState.stage].color);
                sounds.hit(100);
                // Randomize next sector, increase speed
                gameState.orbitAngle = Math.random() * Math.PI * 2;
                const dir = Math.random() > 0.5 ? 1 : -1;
                gameState.orbitSpeed = dir * (Math.abs(gameState.orbitSpeed) * 1.05 + 0.002);
                updateUI();
            } else {
                endOrbitEvent(true);
            }
        }

        function endOrbitEvent(wasMiss) {
            // In Selection Mode with fixed ORBIT, stay in orbit
            if (gameState.fixedChaos === 'ORBIT') {
                if (wasMiss) {
                    gameState.combo = 0;
                    gameState.time = Math.max(0, gameState.time - 5);
                    showBadge('-5s');
                    sounds.miss();
                    showFeedback('MISS!', '#ff3b3b');
                    document.body.classList.add('error-flash');
                    document.getElementById('game-view').classList.add('shake');
                    setTimeout(() => {
                        document.body.classList.remove('error-flash');
                        document.getElementById('game-view').classList.remove('shake');
                    }, 200);
                    updateUI();
                }
                // Re-randomize sector but stay in orbit
                gameState.orbitAngle = Math.random() * Math.PI * 2;
                gameState.orbitSpeed = (Math.random() > 0.5 ? 1 : -1) * (0.03 + Math.random() * 0.03);
                return;
            }
            // In Entertainment Mode, exit orbit on miss
            gameState.orbitActive = false;
            gameState.chaosEvent = null;
            if (wasMiss) handleError();
            triggerBlock();
        }

        function triggerBlock(immediate = false) {
            if (!gameState.active || gameState.orbitActive) return;

            // Process pending chaos end
            if (gameState.pendingChaosEnd) {
                gameState.chaosEvent = null;
                gameState.trapIndex = -1;
                gameState.mirrorTarget = -1;
                document.body.style.transform = 'rotate(0deg)';
                gameState.pendingChaosEnd = false;
            }

            // Process pending chaos start
            if (gameState.pendingChaosStart) {
                const ev = gameState.pendingChaosStart;
                gameState.pendingChaosStart = null;

                if (ev === 'ORBIT') {
                    gameState.chaosEvent = null;
                    startOrbitEvent();
                    showBadge(I18N[gameState.lang].event_orbit);
                    return; // Skip normal block spawn
                }

                gameState.chaosEvent = ev;
                const t = I18N[gameState.lang];
                const badgeTxt = ev === 'DOUBLE' ? t.event_double :
                    ev === 'SPEED' ? t.event_speed :
                        ev === 'TINY' ? t.event_tiny :
                            ev === 'MIRROR' ? t.event_mirror : t.event_spin;
                showBadge(badgeTxt);

                if (ev === 'SPIN') {
                    document.body.style.transform = `rotate(${(Math.random() - 0.5) * 16}deg)`;
                }
            }

            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);

            gameState.isWaiting = true;
            gameState.activeIndex = -1;
            gameState.chaosTarget2 = -1;

            let baseDelay = 1000 - (gameState.hitCount * 15);
            if (gameState.chaosEvent === 'SPEED') baseDelay /= 3;
            if (gameState.chaosEvent === 'MIRROR') baseDelay -= (gameState.mirrorConsecutive || 0) * 30; // speed up every consecutive hit

            const minD = Math.max(gameState.chaosEvent === 'SPEED' ? 100 : 150, baseDelay);
            const maxD = Math.max(gameState.chaosEvent === 'SPEED' ? 300 : 400, baseDelay * 2);
            const delay = immediate ? 10 : (Math.random() * (maxD - minD) + minD);

            setTimeout(() => {
                if (!gameState.active || gameState.orbitActive) return;
                gameState.activeIndex = Math.floor(Math.random() * (gameState.gridSize * gameState.gridSize));

                if (gameState.chaosEvent === 'DOUBLE') {
                    let second;
                    do { second = Math.floor(Math.random() * (gameState.gridSize * gameState.gridSize)); }
                    while (second === gameState.activeIndex);
                    gameState.chaosTarget2 = second;
                }

                if (gameState.chaosEvent === 'TINY') {
                    const shapes = ['square', 'circle', 'heart', 'star'];
                    gameState.tinyShape = shapes[Math.floor(Math.random() * shapes.length)];
                }

                // MIRROR mode: randomly spawn mirror target with RED or GREEN axis
                if (gameState.chaosEvent === 'MIRROR') {
                    gameState.activeIndex = -1; // Don't use normal active
                    const g = gameState.gridSize;
                    const total = g * g;
                    gameState.trapIndex = -1; // Not used anymore, just clean

                    const axes = ['vertical', 'horizontal', 'diagonal'];
                    gameState.mirrorAxis = axes[Math.floor(Math.random() * axes.length)];
                    const randC = Math.random();
                    gameState.mirrorAxisColor = randC < 0.15 ? 'red' : (randC < 0.40 ? 'yellow' : 'green');
                    gameState.mirrorTarget = Math.floor(Math.random() * total);

                    if (gameState.trapTimer) clearTimeout(gameState.trapTimer);

                    // If red axis, automatically pop next block after 1s if didn't click
                    if (gameState.mirrorAxisColor === 'red') {
                        gameState.trapTimer = setTimeout(() => {
                            if (gameState.active && gameState.mirrorTarget !== -1) {
                                gameState.mirrorTarget = -1;
                                triggerBlock(true); // Immediate next
                            }
                        }, 1000);
                    }
                }

                gameState.startTime = performance.now();
                gameState.isWaiting = false;
                sounds.tick();

                // 5s Expiry (No penalty)
                gameState.expiryTimer = setTimeout(() => {
                    if (gameState.active && !gameState.isWaiting) {
                        triggerBlock();
                    }
                }, 5000);
            }, delay);
        }

        function handleInput(e) {
            if (!gameState.active || (gameState.isWaiting && !gameState.orbitActive)) return;

            const rect = canvas.getBoundingClientRect();
            const cx_raw = e.clientX || (e.touches && e.touches[0].clientX);
            const cy_raw = e.clientY || (e.touches && e.touches[0].clientY);
            const x = (cx_raw - rect.left) * (canvas.width / rect.width / (window.devicePixelRatio || 1));
            const y = (cy_raw - rect.top) * (canvas.height / rect.height / (window.devicePixelRatio || 1));

            if (gameState.orbitActive) {
                checkOrbitHit(x, y);
                return;
            }

            const cellSize = (canvas.width / (window.devicePixelRatio || 1)) / gameState.gridSize;
            const col = Math.floor(x / cellSize);
            const row = Math.floor(y / cellSize);
            const idx = row * gameState.gridSize + col;

            // MIRROR mode input
            if (gameState.chaosEvent === 'MIRROR') {
                if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);

                if (gameState.mirrorTarget !== -1) {
                    // Clicked during red axis = Error!
                    if (gameState.mirrorAxisColor === 'red') {
                        gameState.mirrorTarget = -1;
                        if (gameState.trapTimer) clearTimeout(gameState.trapTimer);
                        gameState.mirrorConsecutive = 0;
                        gameState.time = Math.max(0, gameState.time - 3);
                        showBadge('-3s');
                        handleError();
                        triggerBlock(true); // Immediate trigger
                        return;
                    }

                    // Green or Yellow Axis: Check expected click position
                    const g = gameState.gridSize;
                    const mRow = Math.floor(gameState.mirrorTarget / g);
                    const mCol = gameState.mirrorTarget % g;
                    let expectedRow, expectedCol;

                    if (gameState.mirrorAxisColor === 'yellow') {
                        // Yellow: directly click the target itself
                        expectedRow = mRow;
                        expectedCol = mCol;
                    } else {
                        // Green: click symmetric position
                        if (gameState.mirrorAxis === 'vertical') {
                            expectedRow = mRow;
                            expectedCol = g - 1 - mCol;
                        } else if (gameState.mirrorAxis === 'horizontal') {
                            expectedRow = g - 1 - mRow;
                            expectedCol = mCol;
                        } else { // diagonal
                            expectedRow = mCol;
                            expectedCol = mRow;
                        }
                    }
                    const expectedIdx = expectedRow * g + expectedCol;

                    if (idx === expectedIdx) {
                        gameState.mirrorConsecutive = (gameState.mirrorConsecutive || 0) + 1;
                        if (gameState.mirrorConsecutive % 10 === 0) {
                            gameState.time += 5;
                            showBadge('+5s BONUS!');
                        } else {
                            gameState.time += 1;
                            showBadge('+1s');
                        }
                        const rt = Math.round(performance.now() - gameState.startTime);
                        gameState.mirrorTarget = -1;
                        handleSuccess(rt, x, y, true); // Immediate trigger
                    } else {
                        gameState.mirrorConsecutive = 0;
                        gameState.time = Math.max(0, gameState.time - 3);
                        showBadge('-3s');
                        gameState.mirrorTarget = -1;
                        handleError();
                        triggerBlock(true); // Immediate trigger
                    }
                    return;
                }
                return; // Nothing to click
            }

            // Precision Hitbox for TINY
            if (gameState.chaosEvent === 'TINY' && (idx === gameState.activeIndex || idx === gameState.chaosTarget2)) {
                const cellX = col * cellSize;
                const cellY = row * cellSize;
                const centerX = cellX + cellSize / 2;
                const centerY = cellY + cellSize / 2;
                const dist = Math.sqrt((x - centerX) ** 2 + (y - centerY) ** 2);
                const drawSize = (cellSize - 6 * 2 - 4) * 0.35;
                if (dist > drawSize / 2) { handleError(); return; }
            }

            if (idx === gameState.activeIndex && gameState.activeIndex !== -1) {
                const rt = Math.round(performance.now() - gameState.startTime);
                if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
                gameState.activeIndex = -1; // Clear to prevent double click
                handleSuccess(rt, x, y);
            } else if (idx === gameState.chaosTarget2 && gameState.chaosTarget2 !== -1) {
                const rt = Math.round(performance.now() - gameState.startTime);
                if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
                gameState.chaosTarget2 = -1;
                handleSuccess(rt, x, y);
            } else {
                handleError();
            }
        }

        function handleSuccess(rt, x, y, immediateNext = false) {
            sounds.hit(rt);
            gameState.hitCount++;
            gameState.totalHits++;
            gameState.combo++;
            if (rt < gameState.bestReaction) gameState.bestReaction = rt;

            // Scoring
            const base = Math.max(10, 1000 - rt);
            gameState.score += base * gameState.combo;

            // FX
            const themeColor = THEMES[gameState.stage].color;
            for (let i = 0; i < 10; i++) particles.push(new Particle(x, y, themeColor));

            if (rt < 200) showBadge('⚡ LIGHTNING');
            else if (rt < 250) showBadge('🔥 ELITE');

            showFeedback(`${rt}ms`, rt < 300 ? '#00ffaa' : rt < 500 ? '#ffd700' : '#ff8800');

            // Level Progression (Adventure)
            if (gameState.mode === 'ADVENTURE' && gameState.hitCount % 15 === 0 && gameState.stage < 4) {
                gameState.stage++;
                gameState.gridSize = THEMES[gameState.stage].size;
                document.documentElement.style.setProperty('--stage-color', THEMES[gameState.stage].color);
                showBadge(`LEVEL ${gameState.stage}`);
            }

            updateUI();

            // Spin re-tilt on each hit
            if (gameState.chaosEvent === 'SPIN') {
                const angle = (Math.random() - 0.5) * 16; // -8 to 8 deg
                document.body.style.transform = `rotate(${angle}deg)`;
            }

            // If it was a double target and one is still active, don't trigger new block yet
            if (gameState.activeIndex === -1 && gameState.chaosTarget2 === -1) {
                triggerBlock(immediateNext);
            }
        }

        function handleError() {
            if (gameState.isWaiting) return;
            sounds.miss();
            gameState.combo = 0;

            if (gameState.mode === 'SURVIVAL') {
                gameState.lives--;
                updateLives();
                if (gameState.lives <= 0) gameOver();
            } else if (gameState.mode === 'ENTERTAINMENT') {
                gameState.time = Math.max(0, gameState.time - 5);
                showBadge('-5s');
            } else {
                gameState.score = Math.max(0, gameState.score - 1000);
            }

            document.body.classList.add('error-flash');
            document.getElementById('game-view').classList.add('shake');
            showFeedback('MISS!', '#ff3b3b');
            setTimeout(() => {
                document.body.classList.remove('error-flash');
                document.getElementById('game-view').classList.remove('shake');
            }, 200);
            updateUI();
        }

        function showBadge(txt) {
            const b = document.createElement('div');
            b.className = 'badge';
            b.textContent = txt;
            b.style.color = THEMES[gameState.stage].color;
            document.getElementById('badge-container').appendChild(b);
            setTimeout(() => b.remove(), 1000);
        }

        function showFeedback(txt, color) {
            const f = document.getElementById('feedback');
            f.textContent = txt; f.style.color = color; f.style.opacity = 1;
            setTimeout(() => f.style.opacity = 0, 800);
        }

        function updateUI() {
            document.getElementById('score-main').textContent = gameState.score.toLocaleString();
            document.getElementById('combo-val').textContent = gameState.combo;
            document.getElementById('best-val').textContent = gameState.bestReaction === Infinity ? '--' : gameState.bestReaction;

            if (gameState.active) {
                const t = I18N[gameState.lang];
                let label = gameState.mode === 'ADVENTURE' ? t.adventure :
                    gameState.mode === 'SURVIVAL' ? t.survival :
                        gameState.mode === 'SELECTION' ? t.selection : t.entertainment;
                document.getElementById('mode-label').textContent = label;
            }

            if (gameState.mode === 'ADVENTURE' || gameState.mode === 'ENTERTAINMENT' || gameState.mode === 'SELECTION') {
                const maxTime = gameState.mode === 'ADVENTURE' ? 60 : (gameState.mode === 'SELECTION' ? 30 : 180);
                const fill = Math.max(0, (gameState.time / maxTime) * 100);
                document.getElementById('status-fill').style.width = fill + '%';
            }
        }

        function updateLives() {
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((h, i) => {
                if (i >= gameState.lives) h.classList.add('lost');
                else h.classList.remove('lost');
            });
        }

        // --- FLOW ---
        async function startGame(mode, fixedType = null) {
            document.getElementById('overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 400);

            // Countdown
            const cd = document.getElementById('countdown');
            cd.style.display = 'block';
            for (let i = 3; i > 0; i--) {
                cd.textContent = i;
                sounds.count(440 + (3 - i) * 220);
                await new Promise(r => setTimeout(r, 700));
            }
            cd.textContent = "GO!"; sounds.count(1320);
            await new Promise(r => setTimeout(r, 400));
            cd.style.display = 'none';

            // Init State
            gameState = {
                active: true,
                mode: mode,
                score: 0,
                combo: 0,
                stage: mode === 'SELECTION' ? 2 : 1,
                gridSize: (mode === 'ENTERTAINMENT' || mode === 'SELECTION') ? 5 : 4,
                lives: 3,
                time: mode === 'ENTERTAINMENT' ? 180 : (mode === 'SELECTION' ? 30 : 60),
                activeIndex: -1,
                startTime: 0,
                isWaiting: false,
                bestReaction: Infinity,
                hitCount: 0,
                totalHits: gameState.totalHits || 0,
                muted: gameState.muted,
                lang: gameState.lang,
                visualTheme: gameState.visualTheme,
                chaosEvent: fixedType === 'ORBIT' ? null : fixedType,
                pendingChaosStart: null,
                pendingChaosEnd: false,
                chaosTarget2: -1,
                fixedChaos: fixedType,
                orbitActive: fixedType === 'ORBIT',
                orbitAngle: 0,
                orbitSpeed: 0.05
            };

            if (fixedType === 'ORBIT') startOrbitEvent();
            if (fixedType === 'SPIN') document.body.style.transform = 'rotate(5deg)';

            const t = I18N[gameState.lang];
            let label = mode === 'ADVENTURE' ? t.adventure :
                mode === 'SURVIVAL' ? t.survival :
                    mode === 'SELECTION' ? t.selection : t.entertainment;
            document.getElementById('mode-label').textContent = label;
            document.getElementById('lives-container').style.display = mode === 'SURVIVAL' ? 'flex' : 'none';
            document.getElementById('status-bar').style.display = (mode === 'ADVENTURE' || mode === 'ENTERTAINMENT' || mode === 'SELECTION') ? 'block' : 'none';
            document.documentElement.style.setProperty('--stage-color', THEMES[gameState.stage].color);
            document.getElementById('btn-quit').style.display = 'block';
            updateLives();
            updateUI();

            if (mode === 'ADVENTURE' || mode === 'ENTERTAINMENT' || mode === 'SELECTION') startTimer();
            if (mode === 'ENTERTAINMENT') startChaosManager();

            draw();
            if (!gameState.orbitActive) triggerBlock();
        }

        function startTimer() {
            const timer = setInterval(() => {
                if (!gameState.active) { clearInterval(timer); return; }
                gameState.time--;
                updateUI();
                if (gameState.time <= 0) {
                    clearInterval(timer);
                    gameOver();
                }
            }, 1000);
        }

        function startChaosManager() {
            const chaosLoop = setInterval(() => {
                if (!gameState.active || gameState.mode !== 'ENTERTAINMENT') { clearInterval(chaosLoop); return; }

                const events = ['DOUBLE', 'SPEED', 'TINY', 'SPIN', 'ORBIT', 'MIRROR'];
                gameState.pendingChaosStart = events[Math.floor(Math.random() * events.length)];

                setTimeout(() => {
                    gameState.pendingChaosEnd = true;
                }, 6000);

            }, 12000);
        }

        function gameOver() {
            gameState.active = false;
            gameState.orbitActive = false;
            gameState.trapIndex = -1;
            gameState.mirrorTarget = -1;
            if (gameState.trapTimer) clearTimeout(gameState.trapTimer);
            document.body.style.transform = 'rotate(0deg)';
            document.getElementById('btn-quit').style.display = 'none';
            saveStats();
            sounds.gameOver();

            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = 1, 10);

            const t = I18N[gameState.lang];
            document.querySelector('.menu-title').textContent = t.result + ": " + gameState.score.toLocaleString();
            document.getElementById('mode-label').textContent = t.gameover;
            loadStats();
        }

        function quitGame() {
            gameState.active = false;
            gameState.orbitActive = false;
            gameState.trapIndex = -1;
            gameState.mirrorTarget = -1;
            if (gameState.expiryTimer) clearTimeout(gameState.expiryTimer);
            if (gameState.trapTimer) clearTimeout(gameState.trapTimer);
            document.body.style.transform = 'rotate(0deg)';

            document.getElementById('btn-quit').style.display = 'none';

            // clear canvas
            const dpr = window.devicePixelRatio || 1;
            ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = 1, 10);

            const t = I18N[gameState.lang];
            document.querySelector('.menu-title').textContent = t.title;
            document.getElementById('mode-label').textContent = t.standby;
        }

        function saveStats() {
            const hi = localStorage.getItem('hi-score') || 0;
            if (gameState.score > hi) localStorage.setItem('hi-score', gameState.score);

            const total = parseInt(localStorage.getItem('total-clicks') || 0);
            localStorage.setItem('total-clicks', total + gameState.hitCount);
        }

        function loadStats() {
            document.getElementById('hi-score').textContent = (localStorage.getItem('hi-score') || 0).toLocaleString();
            document.getElementById('total-clicks').textContent = (localStorage.getItem('total-clicks') || 0).toLocaleString();
        }

        // --- AUDIO ---
        function initAudio() {
            const savedMuted = localStorage.getItem('muted') === 'true';
            setMuted(savedMuted);
        }

        function setMuted(muted) {
            gameState.muted = muted;
            localStorage.setItem('muted', muted);
            document.getElementById('audio-toggle').textContent = muted ? '🔇' : '🔊';
        }

        document.getElementById('audio-toggle').addEventListener('click', () => {
            setMuted(!gameState.muted);
        });

        // --- LANGUAGE ---
        function initLang() {
            const savedLang = localStorage.getItem('lang') || 'EN';
            setLang(savedLang);
        }

        function setLang(lang) {
            gameState.lang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('lang-toggle').textContent = lang;
            applyLang();
        }

        function applyLang() {
            const t = I18N[gameState.lang];
            const titleEl = document.getElementById('menu-title');
            if (titleEl) titleEl.textContent = t.title;
            const advEl = document.getElementById('txt-adv');
            if (advEl) advEl.textContent = t.adventure;
            const survEl = document.getElementById('txt-surv');
            if (survEl) survEl.textContent = t.survival;
            const entEl = document.getElementById('txt-ent');
            if (entEl) entEl.textContent = t.entertainment;
            const selEl = document.getElementById('txt-sel');
            if (selEl) selEl.textContent = t.selection;

            const selBtns = document.getElementById('sel-menu').querySelectorAll('.sel-btn');
            if (selBtns.length >= 6) {
                selBtns[0].textContent = t.sel_double;
                selBtns[1].textContent = t.sel_speed;
                selBtns[2].textContent = t.sel_tiny;
                selBtns[3].textContent = t.sel_spin;
                selBtns[4].textContent = t.sel_orbit;
                selBtns[5].textContent = t.sel_mirror;
            }
            const backBtn = document.querySelector('.back-btn');
            if (backBtn) backBtn.textContent = gameState.lang === 'EN' ? 'BACK' : '返回';

            const limitC = document.getElementById('label-clicks');
            if (limitC) limitC.textContent = gameState.lang === 'EN' ? 'LIFETIME CLICKS' : '总点击数';
            const limitH = document.getElementById('label-hi-score');
            if (limitH) limitH.textContent = gameState.lang === 'EN' ? 'HI-SCORE' : '最高分';

            updateStyleBtnLabel();

            // Stats labels
            const metaStats = document.getElementById('meta-stats').children;
            if (metaStats.length >= 2) {
                metaStats[0].innerHTML = `${t.best}: <span id="best-val">${gameState.bestReaction === Infinity ? '--' : gameState.bestReaction}</span>ms`;
                metaStats[1].innerHTML = `${t.combo}: <span id="combo-val">${gameState.combo}</span>`;
            }

            if (!gameState.active) {
                const modeLabel = document.getElementById('mode-label');
                if (modeLabel) modeLabel.textContent = t.standby;
            }
        }

        function toggleStyle() {
            gameState.visualTheme = gameState.visualTheme === 'MINIMAL' ? 'PREMIUM' : 'MINIMAL';
            localStorage.setItem('visualTheme', gameState.visualTheme);
            applyTheme();
        }

        function applyTheme() {
            if (gameState.visualTheme === 'PREMIUM') {
                document.body.setAttribute('data-theme', 'premium');
            } else {
                // If there's a light theme, we could handle it here, but default is minimal UI
                document.body.removeAttribute('data-theme');
            }
            updateStyleBtnLabel();
            if (!gameState.active) draw(); // Redraw menu background
        }

        function updateStyleBtnLabel() {
            const t = I18N[gameState.lang];
            const btnTxt = document.getElementById('txt-style');
            if (btnTxt) {
                btnTxt.textContent = t.style_toggle + (gameState.visualTheme === 'MINIMAL' ? t.style_min : t.style_premium);
            }
        }

        function showSelMenu() {
            document.querySelector('.btn-group').style.display = 'none';
            document.getElementById('sel-menu').style.display = 'flex';
        }

        function hideSelMenu() {
            document.getElementById('sel-menu').style.display = 'none';
            document.querySelector('.btn-group').style.display = 'flex';
        }

        // --- THEME (Light/Dark Original) ---
        function initTheme() {
            const toggleBtn = document.getElementById('theme-toggle');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    if (gameState.visualTheme === 'PREMIUM') {
                        // Light mode isn't compatible with premium currently, fallback to toggle style
                        toggleStyle();
                        return;
                    }
                    const isLight = document.body.getAttribute('data-theme') === 'light';
                    if (isLight) {
                        document.body.removeAttribute('data-theme');
                        toggleBtn.textContent = '🌙';
                    } else {
                        document.body.setAttribute('data-theme', 'light');
                        toggleBtn.textContent = '☀️';
                    }
                });
            }
            applyTheme();
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            setLang(gameState.lang === 'EN' ? 'CN' : 'EN');
            updateUI();
        });

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });
        window.addEventListener('resize', initCanvas);

        loadStats();
        initAudio();
        initLang();
        initTheme();
        initCanvas();
    </script>
</body>

</html>
